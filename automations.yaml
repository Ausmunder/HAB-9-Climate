- id: '1763482457315'
  alias: Varmepumpe kun oppvarming (Netatmo)
  description: 'Styrer varmepumpe for oppvarming basert på Netatmo inne-sensor. Vifte-prioritert
    strategi for bedre effektivitet. Aggressiv kulde-kompensasjon ved lave utetemperaturer.
    Bruker input_datetime for pålitelig cooldown.

    '
  triggers:
  - trigger: time_pattern
    minutes: /15
  conditions:
  - condition: template
    value_template: '{{ states(''sensor.netatmo_inne_temperature'') not in [''unknown'',
      ''unavailable'', ''none''] }}'
  - condition: template
    value_template: '{{ (now() - states.sensor.netatmo_inne_temperature.last_updated).total_seconds()
      < 1800 }}'
  actions:
  - if:
    - condition: template
      value_template: '{{ states(''climate.varmepumpe'') != ''heat'' }}'
    then:
    - action: climate.set_hvac_mode
      target:
        entity_id: climate.varmepumpe
      data:
        hvac_mode: heat
  - variables:
      actual: '{{ states(''sensor.netatmo_inne_temperature'') | float(20) }}'
      target: '{{ states(''input_number.onsket_innetemp'') | float(22) }}'
      outdoor: '{{ states(''sensor.netatmo_ute_temperature'') | float(5) }}'
      current_temp: '{{ state_attr(''climate.varmepumpe'', ''temperature'') | float(22)
        }}'
      current_fan: '{{ state_attr(''climate.varmepumpe'', ''fan_mode'') | default(''2'')
        }}'
      diff: '{{ target - actual }}'
      seconds_since_change: "{% set last = states('input_datetime.varmepumpe_sist_endret')
        %} {% if last in ['unknown', 'unavailable', 'none'] %}\n  9999\n{% else %}\n
        \ {{ (now() - (last | as_datetime | as_local)).total_seconds() }}\n{% endif
        %}"
  - variables:
      needs_heat: '{{ diff > 0.3 }}'
      too_warm: '{{ diff < -0.7 }}'
      cold_boost_fan: "{% if outdoor | float < -15 %}\n  2\n{% elif outdoor | float
        < -10 %}\n  1\n{% else %}\n  0\n{% endif %}"
      cold_boost_temp: '{{ 2 if outdoor | float < -15 else 1 }}'
      new_temp: "{% if needs_heat %}\n  {{ [[target + cold_boost_temp, 18] | max,
        25] | min | int }}\n{% elif too_warm %}\n  {{ [target | int, 18] | max }}\n{%
        else %}\n  {{ current_temp | int }}\n{% endif %}"
      new_fan: '{% set base = 5 if diff > 1.5 else 4 if diff > 0.3 else 3 if diff
        > 0.1 else 2 if diff > -0.7 else 1 %} {{ [base + cold_boost_fan | int, 5]
        | min }}'
      temp_change: '{{ new_temp | int != current_temp | int }}'
      fan_change: '{{ new_fan | string != current_fan | string }}'
      needs_change: '{{ temp_change or fan_change }}'
      cooldown_ok: '{{ seconds_since_change | float > 900 }}'
  - condition: template
    value_template: '{{ needs_change and cooldown_ok }}'
  - if:
    - condition: template
      value_template: '{{ temp_change }}'
    then:
    - action: climate.set_temperature
      target:
        entity_id: climate.varmepumpe
      data:
        temperature: '{{ new_temp }}'
  - if:
    - condition: template
      value_template: '{{ fan_change }}'
    then:
    - action: climate.set_fan_mode
      target:
        entity_id: climate.varmepumpe
      data:
        fan_mode: '{{ new_fan }}'
  - action: input_datetime.set_datetime
    target:
      entity_id: input_datetime.varmepumpe_sist_endret
    data:
      datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
  mode: single
- id: '1764247559363'
  alias: Notifikasjon - Varmepumpeinnstilling endret
  description: Sender varsel når varmepumpens setpunkt eller modus endres.
  trigger:
  - trigger: state
    entity_id: climate.varmepumpe
    attribute: temperature
  - trigger: state
    entity_id: climate.varmepumpe
    attribute: fan_mode
  - trigger: state
    entity_id: climate.varmepumpe
    attribute: hvac_mode
  conditions: []
  action:
  - variables:
      new_temp: '{{ state_attr(''climate.varmepumpe'', ''temperature'') }}'
      new_fan: '{{ state_attr(''climate.varmepumpe'', ''fan_mode'') }}'
      new_hvac: '{{ state_attr(''climate.varmepumpe'', ''hvac_mode'') }}'
      old_temp: '{{ trigger.from_state.attributes.temperature }}'
      old_fan: '{{ trigger.from_state.attributes.fan_mode }}'
      old_hvac: '{{ trigger.from_state.attributes.hvac_mode }}'
      message_body: "{% set changes = [] %} {% if new_hvac != old_hvac %}\n  {% set
        changes = changes + [\"Modus: \" ~ old_hvac ~ \" -> \" ~ new_hvac] %}\n{%
        endif %} {% if new_temp != old_temp %}\n  {% set changes = changes + [\"Setpunkt:
        \" ~ old_temp ~ \"°C -> \" ~ new_temp ~ \"°C\"] %}\n{% endif %} {% if new_fan
        != old_fan %}\n  {% set changes = changes + [\"Vifte: \" ~ old_fan ~ \" ->
        \" ~ new_fan] %}\n{% endif %} Varmepumpen har endret innstilling. Endringer:
        {{ changes | join(', ') }}\n"
  - data:
      title: "\U0001F525 Varmepumpe Justering"
      message: '{{ message_body }}'
      data:
        priority: high
        channel: Varmepumpe
    service: notify.mobile_app_pixel_9a
  mode: single
