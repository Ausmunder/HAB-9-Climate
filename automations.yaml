- id: fogger_not_responding_alert
  alias: 'VPD Alert: Fogger Not Responding'
  description: Varsler hvis VPD forblir høy selv om foggeren kjører
  trigger:
  - platform: numeric_state
    entity_id: sensor.chamber_current_vpd_2
    above: 0.3
    for:
      minutes: 60
  condition:
  - condition: state
    entity_id: input_boolean.ventilation_pulse_mode
    state: 'on'
  action:
  - service: notify.mobile_app_pixel_9a
    data:
      title: ⚠️ Fogger Mulig Feil
      message: VPD fortsatt {{ states('sensor.chamber_current_vpd_2') }} kPa etter
        60 min. Sjekk vannivå/dyse!
      data:
        priority: high
        channel: VPD_Alerts
  mode: single
- id: vpd_system_disable_automations
  alias: 'VPD System: Disable All When Turned OFF'
  description: Deaktiverer alle VPD-automasjoner og slår av hardware når systemet
    slås av
  trigger:
  - platform: state
    entity_id: input_boolean.ventilation_pulse_mode
    from: 'on'
    to: 'off'
  action:
  - service: homeassistant.turn_off
    target:
      entity_id:
      - automation.vpd_control_fogger_burst_v3
      - automation.vpd_control_emergency_stop_v3
      - automation.ventilation_time_pattern_v3
    data:
      stop_actions: true
    continue_on_error: true
  - service: switch.turn_off
    target:
      entity_id:
      - switch.fogger_switch
      - switch.vifter_switch
  - service: notify.mobile_app_pixel_9a
    data:
      title: ⛔ VPD System Stopped
      message: 'VPD Control System deaktivert.


        Automasjoner stoppet:

        - Fogger Burst

        - Emergency Stop

        - Ventilation


        Hardware slått av:

        - Fogger

        - Ventilasjon

        '
      data:
        priority: high
        channel: VPD_System
  mode: single
- id: vpd_system_enable_automations
  alias: 'VPD System: Enable Critical Automations'
  description: Aktiverer automatisk Fogger Burst og Emergency Stop når VPD-systemet
    slås PÅ
  trigger:
  - platform: state
    entity_id: input_boolean.ventilation_pulse_mode
    to: 'on'
  action:
  - service: homeassistant.turn_on
    target:
      entity_id:
      - automation.vpd_control_fogger_burst_v3
      - automation.vpd_control_emergency_stop_v3
      - automation.ventilation_time_pattern_v3
    continue_on_error: true
  - service: notify.mobile_app_pixel_9a
    data:
      title: ✅ VPD System Enabled
      message: 'VPD Control System aktivert.


        Automasjoner startet:

        - Fogger Burst

        - Emergency Stop

        - Ventilation

        '
      data:
        priority: high
        channel: VPD_System
  mode: single
- id: '1768123443757'
  alias: Netatmo sensor failsafe
  description: 'Overvåker Netatmo inne-sensor og varsler hvis den ikke har oppdatert
    seg på 30 minutter. Kjører hvert 5. minutt.

    '
  triggers:
  - trigger: time_pattern
    minutes: /5
  conditions:
  - condition: template
    value_template: '{{ states(''sensor.netatmo_inne_temperature'') not in [''unknown'',
      ''unavailable'', ''none''] }}'
  actions:
  - if:
    - condition: template
      value_template: '{{ (now() - states.sensor.netatmo_inne_temperature.last_updated).total_seconds()
        > 1800 }}'
    then:
    - action: notify.mobile_app_pixel_9a
      data:
        title: ⚠️ Netatmo sensor timeout
        message: 'Inne-sensor ikke oppdatert på 30+ min. Sist: {{ states.sensor.netatmo_inne_temperature.last_updated.strftime(''%H:%M'')
          }}. Varmepumpe-styring kan være unøyaktig.'
        data:
          tag: netatmo_timeout
          priority: high
          channel: alarm
  mode: single
- id: '1768382096876'
  alias: Evelina i fallet
  description: Send notifikasjon raskt når Evelina kommer hjem til Lorenfallet.
  triggers:
  - entity_id: person.evelina
    from: not_home
    to: zone.lorenfallet
    trigger: state
  conditions:
  - condition: zone
    entity_id: person.aasmund
    zone: zone.lorenfallet
  actions:
  - data:
      message: Evelina hjemme
      title: Hjemkomst
      data:
        priority: high
        ttl: 0
    action: notify.mobile_app_pixel_9a
  mode: single
- id: chamber_light_on_morning
  alias: 'Chamber Light: Auto ON 06:00'
  description: Slår på lyset i kammeret automatisk kl 06:00
  triggers:
  - trigger: time
    at: 06:00:00
  conditions: []
  actions:
  - service: light.turn_on
    target:
      entity_id: light.fruktenkammer
  mode: single
- id: chamber_light_off_evening
  alias: 'Chamber Light: Auto OFF 18:00'
  description: Slår av lyset i kammeret automatisk kl 18:00
  triggers:
  - trigger: time
    at: '18:00:00'
  conditions: []
  actions:
  - service: light.turn_off
    target:
      entity_id: light.fruktenkammer
  mode: single
