- id: vpd_system_auto_start
  alias: 'VPD System: Auto-start ved HASS oppstart'
  description: Aktiverer VPD pulse mode og alle kritiske automasjoner ved oppstart
    (med retry-logikk)
  trigger:
  - platform: homeassistant
    event: start
  action:
  - delay:
      seconds: 45
  - service: homeassistant.turn_on
    target:
      entity_id:
      - automation.vpd_control_fogger_burst_v3
      - automation.vpd_control_emergency_stop_v3
      - automation.ventilation_time_pattern_v3
    continue_on_error: true
  - delay:
      seconds: 3
  - service: automation.turn_on
    target:
      entity_id:
      - automation.vpd_control_fogger_burst_v3
      - automation.vpd_control_emergency_stop_v3
    continue_on_error: true
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.ventilation_pulse_mode
  - delay:
      seconds: 2
  - service: notify.mobile_app_pixel_9a
    data:
      title: ✅ VPD System Started
      message: 'VPD Control System v3 aktivert automatisk ved oppstart.

        Fogger: 10s bursts hver 90s (11.1% duty cycle)

        Ventilation: Hver 5. minutt

        System er nå i automatisk modus.'
      data:
        priority: high
        channel: VPD_System
  mode: single
