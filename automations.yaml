- id: ventilation_time_pattern_v3
  alias: 'Ventilation: Time Pattern (Udødelig)'
  description: Kjører ventilasjon hver 5. minutt basert på systemklokke - kan ikke
    feile (TEMP - kun vifter)
  trigger:
  - platform: time_pattern
    minutes: /5
  condition:
  - condition: state
    entity_id: input_boolean.ventilation_pulse_mode
    state: 'on'
  action:
  - service: switch.turn_on
    target:
      entity_id:
      - switch.vifter_switch
  - delay:
      seconds: "{% if is_state('input_boolean.pinning_phase', 'on') %}\n  {{ states('input_number.ventilation_on_duration_pinning')
        | int }}\n{% else %}\n  {{ states('input_number.ventilation_on_duration_fruiting')
        | int }}\n{% endif %}\n"
  - service: switch.turn_off
    target:
      entity_id:
      - switch.vifter_switch
  mode: single
- id: vpd_control_fogger_burst_v3
  alias: Fogger Burst
  description: 10s fogger burst hver 90. sekund når VPD er for høy (økt frekvens for
    mindre fluktuasjoner)
  trigger:
  - platform: time_pattern
    minutes: /2
    seconds: 0
  - platform: time_pattern
    minutes: /2
    seconds: 30
  condition:
  - condition: state
    entity_id: input_boolean.ventilation_pulse_mode
    state: 'on'
  - condition: template
    value_template: "{% set vpd = states('sensor.chamber_current_vpd_2') | float(0)
      %} {% set is_pinning = is_state('input_boolean.pinning_phase', 'on') %} {% set
      target_vpd = states('input_number.target_vpd_pinning') | float(0.15) if is_pinning\n
      \                   else states('input_number.target_vpd_fruiting') | float(0.20)
      %}\n{% set hyst = states('input_number.vpd_hysteresis') | float(0.01) %} {{
      vpd > (target_vpd + hyst) }}\n"
  action:
  - service: switch.turn_on
    target:
      entity_id: switch.fogger_switch
  - delay:
      seconds: 12
  - service: switch.turn_off
    target:
      entity_id: switch.fogger_switch
  mode: restart
- id: vpd_control_emergency_stop_v3
  alias: Emergency Stop
  description: Stopper fogger umiddelbart hvis VPD normaliseres under burst/cooldown
  trigger:
  - platform: template
    value_template: "{% set vpd = states('sensor.chamber_current_vpd_2') | float(0)
      %} {% set is_pinning = is_state('input_boolean.pinning_phase', 'on') %} {% set
      target_vpd = states('input_number.target_vpd_pinning') | float(0.15) if is_pinning\n
      \                   else states('input_number.target_vpd_fruiting') | float(0.20)
      %}\n{% set hyst = states('input_number.vpd_hysteresis') | float(0.01) %} {{
      vpd < (target_vpd - hyst) }}\n"
  condition:
  - condition: state
    entity_id: input_boolean.ventilation_pulse_mode
    state: 'on'
  - condition: state
    entity_id: switch.fogger_switch
    state: 'on'
  action:
  - service: switch.turn_off
    target:
      entity_id: switch.fogger_switch
  mode: single
- id: fogger_watchdog_safety
  alias: 'Fogger Watchdog: Safety Shutoff'
