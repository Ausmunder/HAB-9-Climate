# VPD Control System - Input Numbers
# ACH-definisjon: 1 ACH = fan_total_on_time sekunder på-tid per syklus
# Pause = (3600/ACH - fan_total_on_time) / 2 (beregnes i automations)

# VPD-styring
target_vpd_pinning:
  name: Target VPD Pinning Phase
  min: 0.05
  max: 0.30
  step: 0.01
  unit_of_measurement: "kPa"
  icon: mdi:sprout
  initial: 0.10

target_vpd_fruiting:
  name: Target VPD Fruiting Phase
  min: 0.05
  max: 0.35
  step: 0.01
  unit_of_measurement: "kPa"
  icon: mdi:mushroom
  initial: 0.12

# ACH-styring
ach_target_pinning:
  name: ACH Target (Pinning)
  min: 2
  max: 15
  step: 1
  unit_of_measurement: "h⁻¹"
  icon: mdi:fan-speed-1
  initial: 6.0

ach_target_fruiting:
  name: ACH Target (Fruiting)
  min: 2
  max: 15
  step: 1
  unit_of_measurement: "h⁻¹"
  icon: mdi:fan-speed-3
  initial: 7.0

# Hysterese
vpd_hysteresis:
  name: VPD Hysteresis
  min: 0.01
  max: 0.10
  step: 0.01
  unit_of_measurement: "kPa"
  icon: mdi:delta
  initial: 0.01

# Fogger burst
fogger_burst_duration:
  name: Fogger Burst Duration
  min: 2
  max: 30
  step: 1
  unit_of_measurement: "s"
  icon: mdi:water-pump
  mode: slider
  initial: 14

# Ventilasjon
fan_total_on_time:
  name: Fan Total On Time
  min: 20
  max: 300
  step: 10
  unit_of_measurement: "s"
  icon: mdi:fan-clock
  initial: 120

# Power safety
fan_power_min:
  name: Fan Power Min
  min: 1
  max: 50
  step: 1
  unit_of_measurement: "W"
  icon: mdi:flash-alert
  initial: 5

fan_power_max:
  name: Fan Power Max
  min: 10
  max: 200
  step: 1
  unit_of_measurement: "W"
  icon: mdi:flash-alert
  initial: 80

fogger_power_min:
  name: Fogger Power Min
  min: 1
  max: 50
  step: 1
  unit_of_measurement: "W"
  icon: mdi:flash-alert
  initial: 5

fogger_power_max:
  name: Fogger Power Max
  min: 10
  max: 200
  step: 1
  unit_of_measurement: "W"
  icon: mdi:flash-alert
  initial: 60

power_check_delay:
  name: Power Check Delay
  min: 1
  max: 30
  step: 1
  unit_of_measurement: "s"
  icon: mdi:timer-check
  initial: 5

fogger_lockout_time:
  name: Fogger Lockout Time
  min: 30
  max: 600
  step: 30
  unit_of_measurement: "s"
  icon: mdi:lock-clock
  initial: 120
