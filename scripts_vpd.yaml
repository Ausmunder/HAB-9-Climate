# VPD System Scripts

vpd_force_restart:
  alias: 'VPD: Force System Restart'
  description: Slår VPD-systemet AV og PÅ igjen for en ren restart
  sequence:
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.system_enabled
  - delay:
      seconds: 5
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.system_enabled
  - service: persistent_notification.create
    data:
      title: '🔄 VPD System Restarted'
      message: |
        VPD-systemet har blitt restartet.
        System status: {{ states('input_boolean.system_enabled') }}
      notification_id: vpd_force_restart
  mode: single
